apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-{{.Values.acme.name}}
spec:
  acme:
    server: {{.Values.acme.url}}
    email: {{.Values.acme.registrationEmail}}
    privateKeySecretRef:
      name: letsencrypt-{{.Values.acme.name}}
    solvers:
      - http01:
          ingress:
            ingressClassName: {{.Values.acme.ingressClassName}}
