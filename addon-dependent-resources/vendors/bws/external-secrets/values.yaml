clusterSecrets:
  serviceAccountName: secrets
  namespace: secrets
  name: secrets

clusterSecretStore:
  name: cluster-secret-store
  namespaces:
    matchLabels:
      access-cluster-secrets: "true"

externalSecrets:
  enabled: true

cinderCsiPlugin:
  enabled: true
  namespace: cinder-csi-plugin
  secretName: secret
  authUrl: https://keystone.example.com:5000

externalDns:
  enabled: true
  namespace: external-dns
  secretName: secret
  cloudName: cloud
  authUrl: https://keystone.example.com:5000
